<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Velune favicon — the footring mark on a sweet-white tile. -->
  <style>
    .gs-tile { fill: #F7F2E8; }
    .gs-glaze { stroke: #3A342B; }
    .gs-relief { stroke: #3A342B; }
    .gs-foot { stroke: #AD7C4F; }
    @media (prefers-color-scheme: dark) {
      .gs-tile { fill: #1C1915; }
      .gs-glaze { stroke: #EFE9DC; }
      .gs-relief { stroke: #EFE9DC; }
      .gs-foot { stroke: #C79A6B; }
    }
  </style>
  <rect class="gs-tile" width="64" height="64" rx="14"/>
  <path class="gs-glaze" fill="none" stroke-width="3" stroke-linecap="round"
    d="M44.05 49.2A21 21 0 1 0 19.95 49.2"/>
  <path class="gs-relief" fill="none" stroke-width="1.4" stroke-linecap="round" opacity=".13"
    d="M16.5 25C20 19.8 25.5 16.2 32 15.4"/>
  <path class="gs-foot" fill="none" stroke-width="4.6" stroke-linecap="round"
    d="M40.87 51.03A21 21 0 0 0 23.13 51.03"/>
</svg>
